apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: menu-service-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: Helm   # Use your service's label
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /menu/metrics
      interval: 15s
      scrapeTimeout: 10s
