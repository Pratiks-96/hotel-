apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: menu-service-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: menu
  namespaceSelector:
    matchNames:
      - default
  endpoints:
  - port: http
    path: /menu/metrics
    interval: 15s
