apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: enquiries.hotel.com

spec:
  group: hotel.com

  names:
    kind: Enquiry
    plural: enquiries
    singular: enquiry
    shortNames:
      - enq

  scope: Namespaced

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                message:
                  type: string
                purpose:
                  type: string
