apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: hotel-ingress

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - http:
        paths:

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          - path: /api/menu
            pathType: Prefix
            backend:
              service:
                name: menu-service
                port:
                  number: 80

          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80

          - path: /api/enquiry
            pathType: Prefix
            backend:
              service:
                name: enquiry-service
                port:
                  number: 80
