server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Frontend SPA
  location / {
    try_files $uri /index.html;
  }

  # API requests to enquiry service
  location /api/ {
    proxy_pass http://enquiry-service:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Metrics endpoint
location /order/metrics {
    proxy_pass http://enquiry-service:8083/order/metrics;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
}
