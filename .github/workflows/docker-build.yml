name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3


      - name: Login to DockerHub
        uses: docker/login-action@v2

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Frontend
        run: |
          docker build -t pratik6958/hotel-frontend ./frontend
          docker push pratik6958/hotel-frontend


      - name: Build Menu Service
        run: |
          docker build -t pratik6958/hotel-menu ./services/menu-service
          docker push pratik6958/hotel-menu


      - name: Build Order Service
        run: |
          docker build -t pratik6958/hotel-order ./services/order-service
          docker push pratik6958/hotel-order


      - name: Build Enquiry Service
        run: |
          docker build -t YOUR_DOCKERHUB_USERNAME/hotel-enquiry ./services/enquiry-service
          docker push YOUR_DOCKERHUB_USERNAME/hotel-enquiry
